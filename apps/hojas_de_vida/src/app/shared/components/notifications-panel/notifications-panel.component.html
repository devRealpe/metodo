<p-popover #notificationsPopover styleClass="notifications-popover">
  <div class="notifications-container" style="width: 420px; max-height: 500px;">
    <!-- Header -->
    <div class="notifications-header">
      <div class="flex items-center justify-between mb-3 pb-3 border-b">
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white flex items-center gap-2">
          <i class="pi pi-bell"></i>
          Notificaciones
          <span *ngIf="unreadCount > 0" class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-bold text-white bg-red-500 rounded-full">
            {{ unreadCount }}
          </span>
        </h3>
        <button
          *ngIf="unreadCount > 0"
          (click)="markAllAsRead()"
          class="text-sm text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 font-medium transition-colors"
          pButton
          label="Marcar todas como leídas"
          [text]="true"
          size="small"
        ></button>
      </div>
    </div>

      <!-- Notifications List -->
      <div class="notifications-list" style="max-height: 400px; overflow-y: auto;">
        <div *ngIf="notifications.length === 0" class="empty-state">
          <div class="flex flex-col items-center justify-center py-8 text-gray-500 dark:text-gray-400">
            <i class="pi pi-inbox text-5xl mb-3 opacity-50"></i>
            <p class="text-sm font-medium">No tienes notificaciones</p>
          </div>
        </div>

        <div
          *ngFor="let notification of notifications; let i = index"
          class="notification-item"
          [class.unread]="!notification.read"
          (click)="onNotificationClick(notification)"
        >
          <div class="flex gap-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg cursor-pointer transition-colors relative"
               [class.bg-blue-50]="!notification.read"
               [class.dark:bg-gray-800]="!notification.read">
            
            <!-- Indicador de no leído -->
            <div *ngIf="!notification.read" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-10 bg-blue-500 rounded-r"></div>
            
            <!-- Icon -->
            <div class="flex-shrink-0 mt-1">
              <div class="w-10 h-10 rounded-full flex items-center justify-center"
                   [ngClass]="{
                     'bg-green-100 dark:bg-green-900': notification.type === 'success',
                     'bg-red-100 dark:bg-red-900': notification.type === 'error',
                     'bg-orange-100 dark:bg-orange-900': notification.type === 'warning',
                     'bg-blue-100 dark:bg-blue-900': notification.type === 'info'
                   }">
                <i [class]="getNotificationIcon(notification) + ' text-lg'" 
                   [ngClass]="getNotificationColorClass(notification)"></i>
              </div>
            </div>

            <!-- Content -->
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2 mb-1">
                <h4 class="text-sm font-semibold text-gray-900 dark:text-white truncate">
                  {{ notification.title }}
                </h4>
                <button
                  (click)="deleteNotification(notification.id, $event)"
                  class="flex-shrink-0 text-gray-400 hover:text-red-500 transition-colors"
                  pButton
                  icon="pi pi-times"
                  [text]="true"
                  [rounded]="true"
                  size="small"
                  aria-label="Eliminar notificación"
                ></button>
              </div>
              
              <p class="text-sm text-gray-600 dark:text-gray-300 mb-2 line-clamp-2">
                {{ notification.message }}
              </p>
              
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 dark:text-gray-400">
                  {{ formatDate(notification.date) }}
                </span>
                <span *ngIf="notification.link" class="text-xs text-blue-600 dark:text-blue-400 font-medium">
                  Ver detalles →
                </span>
              </div>
            </div>
          </div>

          <!-- Divider -->
          <div *ngIf="i < notifications.length - 1" class="mx-3 border-b border-gray-200 dark:border-gray-700"></div>
        </div>
      </div>

      <!-- Footer -->
      <div *ngIf="notifications.length > 0" class="notifications-footer">
        <div class="pt-3 mt-3 border-t">
          <button
            class="w-full text-center text-sm text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 font-medium py-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded transition-colors"
            pButton
            label="Ver todas las notificaciones"
            [text]="true"
          ></button>
        </div>
      </div>
    </div>
</p-popover>
