<p-toast></p-toast>

<div class="entrevistas-form-container">
  
  <div *ngIf="loading" class="flex justify-center items-center p-8">
    <p-progressSpinner></p-progressSpinner>
  </div>
  
  <p-card class="unimar-card-main" *ngIf="!loading">
    <div class="header-section mb-6">
      <div>
        <h2
          class="page-title text-4xl font-bold bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent">
          {{ modoEdicion ? 'Editar Entrevista' : 'Nueva Entrevista' }}
        </h2>
        <p class="page-subtitle text-gray-600 mt-2">
          Complete todos los campos de la entrevista y evaluación del candidato
        </p>
      </div>
    </div>
    <app-entrevista-form
      *ngIf="postulacionData && postulacionData.postulacion && (!modoEdicion || entrevistaActual)"
      [postulacion]="postulacionData"
      [entrevistaActual]="entrevistaActual"
      (formStatusChange)="onFormStatusChange($event)">
    </app-entrevista-form>
    
    <div *ngIf="!loading && !postulacionData" class="p-6 bg-red-50 dark:bg-red-900 border-l-4 border-red-500 rounded-lg">
      <div class="flex items-start gap-3">
        <i class="pi pi-exclamation-triangle text-red-600 dark:text-red-400 text-2xl"></i>
        <div>
          <p class="text-red-900 dark:text-red-100 font-semibold mb-2">No se pudieron cargar los datos</p>
          <p class="text-red-800 dark:text-red-200">No se encontró información de la postulación. Verifique que el ID sea correcto.</p>
        </div>
      </div>
    </div>

    <div class="mt-6 flex justify-between items-center flex-wrap gap-4">
      <p-button 
        label="Cancelar" 
        icon="pi pi-times" 
        severity="secondary" 
        [outlined]="true" 
        (onClick)="cancelar()"
        type="button">
      </p-button>

      <p-button 
        [label]="modoEdicion ? 'Actualizar' : 'Guardar'" 
        [icon]="modoEdicion ? 'pi pi-check' : 'pi pi-save'" 
        severity="success" 
        (onClick)="guardar()" 
        [loading]="saving"
        [disabled]="loading"
        [title]="modoEdicion ? 'Actualiza la entrevista' : 'Guarda la entrevista'"
        type="button">
      </p-button>
    </div>

  </p-card>
</div>
