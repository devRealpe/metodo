<div class="p-6">
  <h2 class="text-2xl font-bold mb-6">Información Personal</h2>
  

  
  <form [formGroup]="informacionForm" class="space-y-6" [class.opacity-50]="isLoadingData" [class.pointer-events-none]="isLoadingData">
    
    <!-- Información Básica -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Información Básica</h3>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div>
          <app-input-component
            id="primerNombre"
            formControlName="primerNombre"
            [control]="informacionForm.get('primerNombre')"
            label="Primer Nombre"
            placeholder="Ingrese su primer nombre"
            [required]="true"
            [maxlength]="65"
            [customErrorMessages]="getCustomErrorMessages('primerNombre')"
          />
        </div>

        <div>
          <app-input-component
            id="segundoNombre"
            formControlName="segundoNombre"
            [control]="informacionForm.get('segundoNombre')"
            label="Segundo Nombre"
            placeholder="Ingrese su segundo nombre"
            [maxlength]="65"
            [customErrorMessages]="getCustomErrorMessages('segundoNombre')"
          />
        </div>

        <div>
          <app-input-component
            id="primerApellido"
            formControlName="primerApellido"
            [control]="informacionForm.get('primerApellido')"
            label="Primer Apellido"
            placeholder="Ingrese su primer apellido"
            [required]="true"
            [maxlength]="65"
            [customErrorMessages]="getCustomErrorMessages('primerApellido')"
          />
        </div>

        <div>
          <app-input-component
            id="segundoApellido"
            formControlName="segundoApellido"
            [control]="informacionForm.get('segundoApellido')"
            label="Segundo Apellido"
            placeholder="Ingrese su segundo apellido"
            [maxlength]="65"
            [customErrorMessages]="getCustomErrorMessages('segundoApellido')"
          />
        </div>
      </div>
    </div>

    <!-- Documento de Identidad -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Documento de Identidad</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <app-select-component
            id="tipoDocumento"
            formControlName="tipoDocumento"
            [control]="informacionForm.get('tipoDocumento')"
            [options]="tiposDocumento"
            [required]="true"
            [filter]="true"
            label="Tipo de Documento"
            placeholder="Seleccione el tipo de documento"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-input-component
            id="identificacion"
            formControlName="identificacion"
            [control]="informacionForm.get('identificacion')"
            label="Número de Identificación"
            placeholder="Ingrese su número de identificación"
            [required]="true"
            [maxlength]="12"
            [customErrorMessages]="getCustomErrorMessages('identificacion')"
          />
        </div>

        <div>
          <app-select-component
            id="paisExpedicion"
            formControlName="paisExpedicion"
            [control]="informacionForm.get('paisExpedicion')"
            [options]="paises"
            [required]="true"
            [filter]="true"
            label="País de Expedición"
            placeholder="Seleccione el país"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div *ngIf="mostrarDepartamentoExpedicion">
          <app-select-component
            id="departamentoExpedicion"
            formControlName="departamentoExpedicion"
            [control]="informacionForm.get('departamentoExpedicion')"
            [options]="departamentosExpedicion"
            [filter]="true"
            label="Departamento de Expedición"
            placeholder="Seleccione el departamento"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="ciudadExpedicion"
            formControlName="ciudadExpedicion"
            [control]="informacionForm.get('ciudadExpedicion')"
            [options]="ciudadesExpedicion"
            [required]="true"
            [filter]="true"
            label="Ciudad de Expedición"
            placeholder="Seleccione la ciudad"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-datepicker-component
            id="fechaExpedicion"
            formControlName="fechaExpedicion"
            [control]="informacionForm.get('fechaExpedicion')"
            label="Fecha de Expedición"
            placeholder="Seleccione la fecha"
            [required]="true"
            [showIcon]="true"
          />
        </div>
      </div>
    </div>

    <!-- Información Personal -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Información Personal</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <app-datepicker-component
            id="fechaNacimiento"
            formControlName="fechaNacimiento"
            [control]="informacionForm.get('fechaNacimiento')"
            label="Fecha de Nacimiento"
            placeholder="Seleccione la fecha"
            [required]="true"
            [showIcon]="true"
          />
        </div>

        <div>
          <app-select-component
            id="paisNacimiento"
            formControlName="paisNacimiento"
            [control]="informacionForm.get('paisNacimiento')"
            [options]="paises"
            [required]="true"
            [filter]="true"
            label="País de Nacimiento"
            placeholder="Seleccione el país"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div *ngIf="mostrarDepartamentoNacimiento">
          <app-select-component
            id="departamentoNacimiento"
            formControlName="departamentoNacimiento"
            [control]="informacionForm.get('departamentoNacimiento')"
            [options]="departamentosNacimiento"
            [filter]="true"
            label="Departamento de Nacimiento"
            placeholder="Seleccione el departamento"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="ciudadNacimiento"
            formControlName="ciudadNacimiento"
            [control]="informacionForm.get('ciudadNacimiento')"
            [options]="ciudadesNacimiento"
            [required]="true"
            [filter]="true"
            label="Ciudad de Nacimiento"
            placeholder="Seleccione la ciudad"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="genero"
            formControlName="genero"
            [control]="informacionForm.get('genero')"
            [options]="generos"
            [required]="true"
            [filter]="true"
            label="Género"
            placeholder="Seleccione su género"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="estadoCivil"
            formControlName="estadoCivil"
            [control]="informacionForm.get('estadoCivil')"
            [options]="estadosCiviles"
            [required]="true"
            [filter]="true"
            label="Estado Civil"
            placeholder="Seleccione su estado civil"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="nacionalidad"
            formControlName="nacionalidad"
            [control]="informacionForm.get('nacionalidad')"
            [options]="nacionalidades"
            [required]="true"
            [filter]="true"
            label="Nacionalidad"
            placeholder="Seleccione su nacionalidad"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="etnia"
            formControlName="etnia"
            [control]="informacionForm.get('etnia')"
            [options]="etnias"
            [required]="true"
            [filter]="true"
            label="Etnia"
            placeholder="Seleccione su etnia"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">¿Tiene alguna discapacidad?</label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="tieneDiscapacidad"
              [binary]="true"
              inputId="tieneDiscapacidad"
            />
            <label for="tieneDiscapacidad" class="text-sm">
              Sí, tengo una o más discapacidades
            </label>
          </div>
        </div>

        <div *ngIf="informacionForm.get('tieneDiscapacidad')?.value" class="md:col-span-2">
          <app-multiselect-component
            id="discapacidad"
            formControlName="discapacidad"
            [control]="informacionForm.get('discapacidad')"
            label="Seleccione sus discapacidades"
            [options]="discapacidades"
            optionLabel="nombre"
            optionValue="nombre"
            placeholder="Seleccionar discapacidades"
            [filter]="true"
            [required]="true"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Víctima del Conflicto</label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="victimaConflicto"
              [binary]="true"
              inputId="victimaConflicto"
            />
            <label for="victimaConflicto" class="text-sm">
              Soy víctima del conflicto armado
            </label>
          </div>
        </div>

        <div>
          <app-select-component
            id="filiacionPolitica"
            formControlName="filiacionPolitica"
            [control]="informacionForm.get('filiacionPolitica')"
            [options]="filiacionPoliticas"
            [required]="true"
            [filter]="true"
            label="Filiación Política"
            placeholder="Seleccione su filiación política"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="libretaMilitar"
            formControlName="libretaMilitar"
            [control]="informacionForm.get('libretaMilitar')"
            [options]="libretasMilitares"
            [required]="true"
            [filter]="true"
            label="Libreta Militar"
            placeholder="Seleccione libreta militar"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>
      </div>
    </div>

    <!-- Información de Residencia -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Información de Residencia</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <app-select-component
            id="paisResidencia"
            formControlName="paisResidencia"
            [control]="informacionForm.get('paisResidencia')"
            [options]="paises"
            [required]="true"
            [filter]="true"
            label="País de Residencia"
            placeholder="Seleccione el país"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div *ngIf="mostrarDepartamentoResidencia">
          <app-select-component
            id="departamentoResidencia"
            formControlName="departamentoResidencia"
            [control]="informacionForm.get('departamentoResidencia')"
            [options]="departamentosResidencia"
            [filter]="true"
            label="Departamento de Residencia"
            placeholder="Seleccione el departamento"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="ciudadResidencia"
            formControlName="ciudadResidencia"
            [control]="informacionForm.get('ciudadResidencia')"
            [options]="ciudadesResidencia"
            [required]="true"
            [filter]="true"
            label="Ciudad de Residencia"
            placeholder="Seleccione la ciudad"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-input-component
            id="barrio"
            formControlName="barrio"
            [control]="informacionForm.get('barrio')"
            label="Barrio"
            placeholder="Ingrese su barrio"
            [required]="true"
            [maxlength]="100"
            [customErrorMessages]="getCustomErrorMessages('barrio')"
          />
        </div>

        <div>
          <app-input-component
            id="direccion"
            formControlName="direccion"
            [control]="informacionForm.get('direccion')"
            label="Dirección"
            placeholder="Ingrese su dirección completa"
            [required]="true"
            [maxlength]="100"
            [customErrorMessages]="getCustomErrorMessages('direccion')"
          />
        </div>

        <div>
          <app-select-component
            id="sector"
            formControlName="sector"
            [control]="informacionForm.get('sector')"
            [options]="sectores"
            [required]="true"
            label="Sector"
            placeholder="Seleccione el sector"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <app-select-component
            id="estrato"
            formControlName="estrato"
            [control]="informacionForm.get('estrato')"
            [options]="estratos"
            [required]="true"
            [filter]="true"
            label="Estrato"
            placeholder="Seleccione el estrato"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>
      </div>
    </div>

    <!-- Información de Contacto -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Información de Contacto</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <app-input-component
            id="telefono"
            formControlName="telefono"
            [control]="informacionForm.get('telefono')"
            label="Teléfono Fijo"
            placeholder="Ingrese su teléfono fijo"
            [maxlength]="13"
            type="tel"
            [customErrorMessages]="getCustomErrorMessages('telefono')"
          />
        </div>

        <div>
          <app-input-component
            id="celular1"
            formControlName="celular1"
            [control]="informacionForm.get('celular1')"
            label="Celular Principal"
            placeholder="Ingrese su celular principal"
            [required]="true"
            [maxlength]="13"
            type="tel"
            [customErrorMessages]="getCustomErrorMessages('celular1')"
          />
        </div>

        <div>
          <app-input-component
            id="celular2"
            formControlName="celular2"
            [control]="informacionForm.get('celular2')"
            label="Celular Secundario"
            placeholder="Ingrese su celular secundario"
            [maxlength]="13"
            type="tel"
            [customErrorMessages]="getCustomErrorMessages('celular2')"
          />
        </div>

        <div>
          <app-input-component
            id="correo"
            formControlName="correo"
            [control]="informacionForm.get('correo')"
            label="Correo Electrónico"
            placeholder="Ingrese su correo electrónico"
            [required]="true"
            [maxlength]="50"
            type="email"
            [customErrorMessages]="getCustomErrorMessages('correo')"
          />
        </div>
      </div>
    </div>

    <!-- Aspiración Laboral -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Aspiración Laboral</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <app-inputnumber-component
            id="aspiracionSalario"
            formControlName="aspiracionSalario"
            [control]="informacionForm.get('aspiracionSalario')"
            label="Aspiración Salarial (COP)"
            placeholder="Ej: 1500000"
            [required]="true"
            [mode]="'currency'"
            [currency]="'COP'"
            [locale]="'es-CO'"
            [customErrorMessages]="getCustomErrorMessages('aspiracionSalario')"
          />
        </div>

        <div>
          <app-select-component
            id="area"
            formControlName="area"
            [control]="informacionForm.get('area')"
            [options]="areas"
            [required]="true"
            [filter]="true"
            label="Área de Interés"
            placeholder="Seleccione el área"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Actualmente Trabaja</label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="trabajoActual"
              [binary]="true"
              inputId="trabajoActual"
            />
            <label for="trabajoActual" class="text-sm">
              Actualmente me encuentro trabajando
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Información Adicional -->
    <div>
      <h3 class="text-xl font-semibold mb-4">Información Adicional</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Hoja de Vida Presentada</label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="hojaVidaPresentada"
              [binary]="true"
              inputId="hojaVidaPresentada"
            />
            <label for="hojaVidaPresentada" class="text-sm">
              He presentado hoja de vida anteriormente
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Trabaja en la Universidad</label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="trabajaUniversidad"
              [binary]="true"
              inputId="trabajaUniversidad"
            />
            <label for="trabajaUniversidad" class="text-sm">
              Actualmente trabajo en la universidad
            </label>
          </div>
        </div>

        <div *ngIf="informacionForm.get('trabajaUniversidad')?.value">
                          <app-input-component
                  id="cargoUniversidad"
                  label="Cargo En La Universidad"
                  [control]="informacionForm.get('cargoUniversidad')"
                  [customErrorMessages]="getCustomErrorMessages('cargoUniversidad')"
                ></app-input-component>
        </div>

        <div *ngIf="informacionForm.get('trabajaUniversidad')?.value">
          <app-select-component
            id="dependencia"
            formControlName="dependencia"
            [control]="informacionForm.get('dependencia')"
            [options]="dependencias"
            [filter]="true"
            label="Dependencia"
            placeholder="Seleccione la dependencia"
            optionLabel="nombre"
            optionValue="id"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Egresado de la Universidad</label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="egresadoUniversidad"
              [binary]="true"
              inputId="egresadoUniversidad"
            />
            <label for="egresadoUniversidad" class="text-sm">
              Soy egresado de esta universidad
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">
            Política de Datos <span class="text-red-500">*</span>
          </label>
          <div class="flex items-center space-x-2">
            <p-checkbox
              formControlName="politica_datos"
              [binary]="true"
              inputId="politica_datos"
            />
            <label for="politica_datos" class="text-sm">
              Acepto la política de tratamiento de datos personales
            </label>
          </div>
          <small 
            *ngIf="informacionForm.get('politica_datos')?.hasError('required') && informacionForm.get('politica_datos')?.touched"
            class="text-red-500 text-xs mt-1"
          >
            {{ errorMessages['politica_datos']['required'] }}
          </small>
        </div>
      </div>
    </div>

    <!-- Botón de Guardar/Actualizar -->
    <div class="flex justify-end gap-4 mt-6">
      <button
        pButton
        type="button"
        [label]="tieneDatosGuardados ? 'Actualizar Información' : 'Guardar Información'"
        [icon]="isSubmitting ? 'pi pi-spin pi-spinner' : 'pi pi-save'"
        class="p-button-primary"
        [disabled]="isSubmitting || informacionForm.invalid"
        (click)="onSubmit()"
      ></button>
    </div>

  </form>
</div>

<!-- Toast para notificaciones -->
<p-toast></p-toast>

<!-- Diálogo de confirmación -->
<p-confirmDialog></p-confirmDialog>
