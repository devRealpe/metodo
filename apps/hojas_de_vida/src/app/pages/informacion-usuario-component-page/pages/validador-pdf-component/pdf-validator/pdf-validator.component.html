<div class="pdf-validator-container">
  <!-- Zona de selección de archivo sin card wrapper -->
  <div class="file-selection-area">
    <!-- Área de drag & drop o click -->
    <div 
      class="border-2 border-dashed border-300 p-2 border-round transition-colors cursor-pointer hover:border-primary bg-surface-50"
      [class.border-primary]="isValidating"
      (click)="fileUpload.click()"
      [style.pointer-events]="isValidating ? 'none' : 'auto'"
    >
      <!-- Input de archivo oculto -->
      <input 
        #fileUpload
        type="file" 
        class="hidden"
        [accept]="config.acceptedMimeTypes.join(',')"
        (change)="onFileSelect($event)"
        [disabled]="isValidating"
      />

      <div *ngIf="!hasFile && !isValidating" class="text-center">
        <i class="pi pi-cloud-upload text-lg text-400 mb-1"></i>
        <p class="m-0 text-600 text-xs">
          <strong>Haga clic para seleccionar</strong> o arrastre un archivo PDF aquí
        </p>
        <p class="text-xs text-400 mt-1">
          Máximo {{ maxFileSizeMB }}MB • Solo archivos PDF
        </p>
      </div>

      <!-- Información del archivo seleccionado -->
      <div *ngIf="hasFile && !isValidating" class="text-center">
        <i class="pi pi-file-pdf text-red-600 text-lg mb-1"></i>
        <p class="m-0 font-semibold text-900 text-xs">{{ selectedFile?.name }}</p>
        <p class="text-xs text-600 mt-1">{{ selectedFileSizeMB }} MB</p>
        
        <div class="flex gap-1 justify-content-center mt-1">
          <p-button
            label="Cambiar"
            icon="pi pi-refresh"
            severity="secondary"
            size="small"
            [text]="true"
            (click)="fileUpload.click(); $event.stopPropagation()"
          />
          <p-button
            label="Limpiar"
            icon="pi pi-times"
            severity="danger"
            size="small"
            [text]="true"
            (click)="clearSelection(); $event.stopPropagation()"
          />
        </div>
      </div>

      <!-- Estado de validación -->
      <div *ngIf="isValidating" class="text-center">
        <i class="pi pi-spin pi-spinner text-primary text-lg mb-1"></i>
        <p class="m-0 font-semibold text-900 text-xs">Validando...</p>
        
        <div class="mt-1">
          <p-progressBar 
            [value]="uploadProgress"
            [showValue]="false"
            styleClass="h-0-25rem"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Botones de acción (solo si es necesario) -->
  <div class="actions-area mt-1" *ngIf="hasFile && (!config.autoValidateOnSelect || !hasValidationResult)">
    <div class="flex gap-1 justify-content-center">
      <p-button
        label="Validar"
        icon="pi pi-check"
        severity="primary"
        size="small"
        [loading]="isValidating"
        [disabled]="!hasFile || isValidating"
        (click)="validatePdf()"
      />
    </div>
  </div>

  <!-- Mensaje de error -->
  <p-message 
    *ngIf="fileError"
    severity="error"
    [text]="fileError"
    styleClass="w-full mt-1"
  />

  <!-- Resultados de validación simplificados -->
  <div class="validation-results mt-1" *ngIf="hasValidationResult">
    <div class="flex align-items-center gap-2 p-2 border-round"
         [class.bg-green-50]="isValidDocument && isCorrectDocumentType"
         [class.bg-red-50]="!isValidDocument || !isCorrectDocumentType">
      <i 
        class="text-sm"
        [class]="isValidDocument && isCorrectDocumentType ? 'pi pi-check-circle text-green-600' : 'pi pi-times-circle text-red-600'"
      ></i>
      <span class="text-xs font-medium">
        {{ getValidationMessage() }}
      </span>
    </div>
  </div>
</div>
