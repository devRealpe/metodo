<p-toast></p-toast>

<div class="lineas-estrategicas-container">
  <h1>Líneas Estratégicas de Internacionalización</h1>

  <div *ngIf="loading" class="loading">
    Cargando...
  </div>

  <div *ngIf="!loading && lineasEstrategicas.length > 0" class="lineas-list">
    <div *ngFor="let linea of lineasEstrategicas" class="linea-card">
      <div class="linea-header">
        <h3>{{ linea.nombre }}</h3>
        <span class="codigo">{{ linea.codigo }}</span>
      </div>
      <p class="descripcion">{{ linea.descripcion }}</p>
      <div class="linea-footer">
        <span class="orden">Orden: {{ linea.orden }}</span>
        <span class="activo" [class.activo-yes]="linea.activo" [class.activo-no]="!linea.activo">
          {{ linea.activo ? 'Activo' : 'Inactivo' }}
        </span>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && lineasEstrategicas.length === 0" class="no-data">
    No hay líneas estratégicas disponibles.
  </div>
</div>
