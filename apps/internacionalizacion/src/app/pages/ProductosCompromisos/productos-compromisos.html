
<!-- card removed -->
<div>
    <!-- Mini formulario para agregar nuevos productos -->
    <div class="mb-6 p-4 border border-surface-200 dark:border-surface-700 rounded-lg bg-surface-50 dark:bg-surface-900" *ngIf="showButtons">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <app-input-component
            id="nuevoCompromiso"
            label="Compromiso"
            placeholder="Ingresa el compromiso"
            [(ngModel)]="nuevoProducto.compromiso"
            [ngModelOptions]="{standalone: true}">
          </app-input-component>
        </div>
        <div>
          <app-datepicker-component
            id="nuevaFecha"
            label="Fecha de entrega"
            placeholder="dd/mm/aaaa"
            [(ngModel)]="nuevoProducto.fechaEntrega"
            [ngModelOptions]="{standalone: true}"
            dateFormat="dd/mm/yy"
            [showIcon]="true">
          </app-datepicker-component>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1" [style]="{'color': 'var(--p-text-color)'}">Estado</label>
          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">
              <p-radioButton
                value="si"
                [(ngModel)]="nuevoProducto.estado"
                [ngModelOptions]="{standalone: true}"
                inputId="nuevo-si"
              ></p-radioButton>
              <label for="nuevo-si" class="text-sm" [style]="{'color': 'var(--p-text-color)'}">Sí</label>
            </div>
            <div class="flex items-center gap-2">
              <p-radioButton
                value="no"
                [(ngModel)]="nuevoProducto.estado"
                [ngModelOptions]="{standalone: true}"
                inputId="nuevo-no"
              ></p-radioButton>
              <label for="nuevo-no" class="text-sm" [style]="{'color': 'var(--p-text-color)'}">No</label>
            </div>
            <div class="flex items-center gap-2">
              <p-radioButton
                value="pendiente"
                [(ngModel)]="nuevoProducto.estado"
                [ngModelOptions]="{standalone: true}"
                inputId="nuevo-pendiente"
              ></p-radioButton>
              <label for="nuevo-pendiente" class="text-sm" [style]="{'color': 'var(--p-text-color)'}">Pendiente</label>
            </div>
          </div>
        </div>
        <div>
          <app-textarea-component
            id="nuevasObservaciones"
            label="Observaciones"
            placeholder="Observaciones"
            [rows]="2"
            [(ngModel)]="nuevoProducto.observaciones"
            [ngModelOptions]="{standalone: true}">
          </app-textarea-component>
        </div>
      </div>
      <div class="mt-4 flex gap-2">
        <p-button
          [label]="isEditing ? 'Actualizar Producto' : 'Agregar Producto'"
          icon="pi pi-plus"
          (onClick)="agregarProducto()"
          [loading]="loading()"
          [disabled]="loading()"
          severity="primary">
        </p-button>
        <p-button
          *ngIf="isEditing"
          label="Cancelar Edición"
          icon="pi pi-times"
          (onClick)="cancelarEdicion()"
          severity="secondary">
        </p-button>
      </div>
    </div>

    <!-- Tabla de productos -->
    <lib-info-table
      [data]="productos"
      [columns]="columns"
      [actions]="actions"
      [loading]="loading()"
      [emptyMessage]="'No hay productos registrados'"
      emptyIcon="pi pi-box"
      emptyTitle="Sin productos"
      emptySubtitle="No hay productos registrados aún">
      <ng-template #customCell let-row let-column="column">
        <ng-container *ngIf="column.field === 'estadoFormateado'">
          <app-select-component
            [id]="'estado-' + (row.id || row.compromiso)"
            placeholder="Seleccionar estado"
            [(ngModel)]="row.estado"
            [ngModelOptions]="{standalone: true}"
            [options]="opcionesEstado"
            optionLabel="label"
            optionValue="value"
            [appendTo]="'body'"
            (selectionChange)="onEstadoChange(row)">
          </app-select-component>
        </ng-container>
        <ng-container *ngIf="column.field !== 'estadoFormateado'">
          {{ row[column.field] }}
        </ng-container>
      </ng-template>
    </lib-info-table>
</div>
