<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="p-4">
  <!-- Header -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Convocatorias</h2>
    <p class="text-gray-500 mt-1">Gestión de convocatorias de movilidad internacional</p>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="dashboard-card bg-white rounded-xl shadow-sm p-4 border-l-4 cursor-pointer"
         [class.border-blue-500]="filtroEstado !== 'total'"
         [class.border-blue-700]="filtroEstado === 'total'"
         (click)="limpiarFiltros()">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Total</p>
          <p class="text-2xl font-bold text-blue-600">{{ estadisticas.total }}</p>
        </div>
        <i class="pi pi-list text-3xl text-blue-400"></i>
      </div>
    </div>
    <div class="dashboard-card bg-white rounded-xl shadow-sm p-4 border-l-4 cursor-pointer"
         [class.border-green-500]="filtroEstado !== 'ABIERTA'"
         [class.border-green-700]="filtroEstado === 'ABIERTA'"
         (click)="filtrarPorEstado('ABIERTA')">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Abiertas</p>
          <p class="text-2xl font-bold text-green-600">{{ estadisticas.abiertas }}</p>
        </div>
        <i class="pi pi-check-circle text-3xl text-green-400"></i>
      </div>
    </div>
    <div class="dashboard-card bg-white rounded-xl shadow-sm p-4 border-l-4 cursor-pointer"
         [class.border-yellow-500]="filtroEstado !== 'PROGRAMADA'"
         [class.border-yellow-700]="filtroEstado === 'PROGRAMADA'"
         (click)="filtrarPorEstado('PROGRAMADA')">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Programadas</p>
          <p class="text-2xl font-bold text-yellow-600">{{ estadisticas.programadas }}</p>
        </div>
        <i class="pi pi-clock text-3xl text-yellow-400"></i>
      </div>
    </div>
    <div class="dashboard-card bg-white rounded-xl shadow-sm p-4 border-l-4 cursor-pointer"
         [class.border-red-500]="filtroEstado !== 'CERRADA'"
         [class.border-red-700]="filtroEstado === 'CERRADA'"
         (click)="filtrarPorEstado('CERRADA')">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-gray-500">Cerradas</p>
          <p class="text-2xl font-bold text-red-600">{{ estadisticas.cerradas }}</p>
        </div>
        <i class="pi pi-times-circle text-3xl text-red-400"></i>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <div class="flex flex-wrap items-center gap-4">
      <div class="flex-1 min-w-[200px]">
        <lib-input
          label="Buscar"
          placeholder="Buscar por título, institución o país..."
          [(ngModel)]="filtroTitulo"
          (ngModelChange)="aplicarFiltros()">
        </lib-input>
      </div>
      <div class="flex items-center gap-2 pt-5">
        <p-button icon="pi pi-filter-slash" label="Limpiar" severity="secondary" [text]="true" (onClick)="limpiarFiltros()"></p-button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <lib-info-table
    [data]="convocatoriasFiltradas"
    [columns]="columns"
    [actions]="actions"
    [loading]="loading"
    [paginator]="true"
    [rows]="10">
  </lib-info-table>

  <!-- Bottom Actions -->
  <div class="flex justify-between mt-4">
    <p-button icon="pi pi-arrow-left" label="Atrás" severity="secondary" [outlined]="true" (onClick)="volver()"></p-button>
    <p-button icon="pi pi-plus" label="Nueva Convocatoria" (onClick)="abrirNueva()"></p-button>
  </div>
</div>

<!-- Create/Edit Dialog -->
<p-dialog
  [header]="editando ? 'Editar Convocatoria' : 'Nueva Convocatoria'"
  [(visible)]="mostrarDialog"
  [modal]="true"
  [style]="{width: '700px'}"
  [draggable]="false"
  [resizable]="false">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-2">
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
      <input type="text" pInputText class="w-full" [(ngModel)]="convocatoriaForm.titulo" placeholder="Título de la convocatoria" />
    </div>
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
      <textarea pInputTextarea class="w-full" rows="3" [(ngModel)]="convocatoriaForm.descripcion" placeholder="Descripción detallada"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Institución</label>
      <input type="text" pInputText class="w-full" [(ngModel)]="convocatoriaForm.institucion" placeholder="Nombre de la institución" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">País</label>
      <input type="text" pInputText class="w-full" [(ngModel)]="convocatoriaForm.pais" placeholder="País" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Cobertura</label>
      <input type="text" pInputText class="w-full" [(ngModel)]="convocatoriaForm.cobertura" placeholder="Ej: Total, Parcial" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Enlace</label>
      <input type="text" pInputText class="w-full" [(ngModel)]="convocatoriaForm.enlace" placeholder="URL de la convocatoria" />
    </div>
    <div>
      <lib-datepicker label="Fecha Inicio *" [(ngModel)]="convocatoriaForm.fechaInicio"></lib-datepicker>
    </div>
    <div>
      <lib-datepicker label="Fecha Cierre *" [(ngModel)]="convocatoriaForm.fechaCierre"></lib-datepicker>
    </div>
    <div class="md:col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Requisitos</label>
      <textarea pInputTextarea class="w-full" rows="3" [(ngModel)]="convocatoriaForm.requisitos" placeholder="Requisitos de la convocatoria"></textarea>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="mostrarDialog = false"></p-button>
      <p-button label="Guardar" icon="pi pi-check" (onClick)="guardarConvocatoria()"></p-button>
    </div>
  </ng-template>
</p-dialog>
