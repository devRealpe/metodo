<p-dialog
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="crear-plan-dialog"
  [style]="{ width: '600px' }"
  [baseZIndex]="10000"
  [appendTo]="'body'"
  (onHide)="onHide()"
>
  <ng-template pTemplate="header">
    <div class="dialog-header">
      <div class="header-icon">
        <i
          class="pi pi-file-plus text-primary"
          style="box-shadow: 0 4px 12px rgba(17, 69, 92, 0.4)"
        ></i>
      </div>
      <span class="dialog-title">CREAR ACTIVIDAD</span>
    </div>
  </ng-template>

  <div class="dialog-content">
    <div class="profesor-info-card">
      <h4 class="info-title">
        <i class="pi pi-bookmark"></i>
        Información de la Sección
      </h4>
      <div class="info-grid">
        <div class="info-item">
          <span><strong>Nombre:</strong> {{ seccionHijo?.nombre }}</span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-field">
        <label for="nombre" class="field-label"> Nombre de la Actividad </label>
        <input
          id="nombre"
          type="text"
          pInputText
          [(ngModel)]="nuevaActividad.nombre"
          placeholder="Ingrese el nombre de la actividad"
          [invalid]="mostrarValidacion && !nuevaActividad.nombre"
          class="w-full"
          maxlength="255"
        />
        @if (mostrarValidacion && !nuevaActividad?.nombre) {
        <p-message severity="error" variant="simple" size="small"
          >El nombre de la actividad es requerido</p-message
        >
        }

        <label for="horasMaximas" class="field-label"> Horas Máximas </label>
        <p-inputnumber
          id="horasMaximas"
          [(ngModel)]="nuevaActividad.horasMaximas"
          [min]="0"
          [max]="40"
          [showButtons]="false"
          buttonLayout="vertical"
          spinnerMode="vertical"
          inputId="vertical"
          class="w-full"
          placeholder="Ingrese el número de horas máximas"
        >
        </p-inputnumber>
        @if (mostrarValidacion && nuevaActividad.horasMaximas === 0) {
        <p-message severity="error" variant="simple" size="small"
          >El número de horas máximas es requerido</p-message
        >
        }
      </div>

      <div class="form-field">
        <label
          class="field-label"
          style="display: block; margin-bottom: 0.5rem"
        >
          Características
        </label>
        <div class="flex align-items-center gap-4">
          <div class="flex items-center">
            <p-checkbox
              [(ngModel)]="nuevaActividad.tieneDescripcion"
              [binary]="true"
              inputId="tieneDescripcion"
            ></p-checkbox>
            <label
              for="tieneDescripcion"
              class="cursor-pointer ml-2"
              [ngClass]="{'text-primary font-semibold': nuevaActividad.tieneDescripcion}"
              style="transition: color 0.2s"
            >
              Requiere descripción
            </label>
          </div>
          <div class="flex items-center">
            <p-checkbox
              [(ngModel)]="nuevaActividad.tieneAsesorias"
              [binary]="true"
              inputId="tieneAsesorias"
              [style]="{ marginLeft: '0.5rem' }"
            ></p-checkbox>
            <label
              for="tieneAsesorias"
              class="cursor-pointer ml-2"
              [ngClass]="{'text-primary font-semibold': nuevaActividad.tieneAsesorias}"
              style="transition: color 0.2s"
            >
              Requiere asesorias
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <button
        type="button"
        pButton
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-outlined p-button-secondary"
        (click)="onCancelar()"
        [disabled]="guardando"
      ></button>
      <button
        type="button"
        pButton
        label="Guardar Actividad"
        icon="pi pi-check"
        class="p-button-success"
        (click)="onGuardar()"
        [loading]="guardando"
      ></button>
    </div>
  </ng-template>
</p-dialog>
