<div class="p-4">
  <h2 class="text-xl font-bold mb-4">Administración - Seleccione un usuario</h2>

  <input
    pInputText
    [(ngModel)]="cedulaBusqueda"
    placeholder="Ingrese cédula"
    (keyup.enter)="buscarUsuario()"
    class="w-full mb-3 surface-card text-color"
  />
  <p-button label="Buscar" (click)="buscarUsuario()" class="mb-4" />

  <div
    *ngIf="usuarioEncontrado"
    class="mt-4 p-3 border-round surface-card"
  >
    <p class="m-0 mb-2">
      <strong>Nombre:</strong> {{ usuarioEncontrado.nombres }} {{ usuarioEncontrado.apellidos }}
    </p>
    <p class="m-0 mb-3">
      <strong>Cargo:</strong> {{ usuarioEncontrado.cargo }}
    </p>

    <div class="flex flex-wrap gap-2">
      <p-button
        label="Ver como Profesor"
        *ngIf="usuarioEncontrado.cargo === 'PROFESOR'"
        (click)="navegar('home-profesor')"
        severity="success"
      ></p-button>

      <p-button
        label="Ver como Decano"
        *ngIf="usuarioEncontrado.cargo === 'DECANO (A)'"
        (click)="navegar('home-decano')"
        severity="success"
      ></p-button>

      <p-button
        label="Ver como Director"
        *ngIf="usuarioEncontrado.cargo === 'DIRECTOR DE PROGRAMA'"
        (click)="navegar('home-director')"
        severity="success"
      ></p-button>
    </div>
  </div>

  <div
    *ngIf="!usuarioEncontrado && cedulaBusqueda.trim()"
    class="mt-4 p-3 border-round surface-card text-red-500"
  >
    <i class="pi pi-info-circle mr-2"></i>
    No se encontró ningún usuario con esa cédula.
  </div>
</div>
