<div class="dashboard-layout">
  <lib-drawer-component
    [logoTitle]="logoTitle"
    [homeRoute]="'/app/admin/dashboard'"
    [sections]="visibleSections"
    [user]="user"
    [visible]="drawerVisible"
    [modal]="true"
    [showCloseIcon]="true"
    [showThemeToggle]="true"
    [showNotifications]="false"
    (visibleChange)="onDrawerVisibilityChange($event)"
    (menuItemClick)="onMenuItemClick($event)"
    (userProfileClick)="onUserProfileClick()"
    (themeToggle)="onThemeToggle($event)"
    (logout)="onLogout()"
  ></lib-drawer-component>

  <div class="main-content" [class.drawer-open]="drawerVisible">
    <header class="top-header">
      <div class="header-content">
        <h1 class="page-title">Sistema de Evaluación de Desempeño</h1>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
