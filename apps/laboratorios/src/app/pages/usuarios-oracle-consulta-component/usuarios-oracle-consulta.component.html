<p-card class="w-full max-w-6xl mx-auto"
[style]="{
              'background': 'var(--p-surface-50)',
              'border': '1px solid var(--p-border)',
              'box-shadow': 'var(--p-elevation-2)'
            }">
  <ng-template pTemplate="header">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2">
      <h2 class="text-2xl font-semibold m-0">Usuarios</h2>
      <div class="flex gap-2">
        <button pButton label="Limpiar filtros" icon="pi pi-filter-slash" [text]="true"
          (click)="limpiarFiltros()"
          aria-label="Limpiar filtros"
        ><span class="sr-only">Limpiar</span></button>
        <button pButton label="Recargar" icon="pi pi-refresh" (click)="recargar()"
          aria-label="Recargar datos"
        ><span class="sr-only">Recargar</span></button>
      </div>
    </div>
  </ng-template>

  <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3">
    <div>
      <app-input-component label="Identificación" [ngModel]="filtros().identificacion"
        (ngModelChange)="aplicarFiltroTexto('identificacion', $event)" placeholder="123456789" class="w-full">
      </app-input-component>
    </div>

    <div>
      <app-input-component label="Nombre" [ngModel]="filtros().nombre"
        (ngModelChange)="aplicarFiltroTexto('nombre', $event)" placeholder="Juan Pérez" class="w-full">
      </app-input-component>
    </div>

    <div>
      <app-select-component label="Facultad" [options]="opciones.facultades()" [ngModel]="filtros().facultad"
        (ngModelChange)="aplicarFiltroTexto('facultad', $event)" [filter]="filter" [showClear]="true" placeholder="Todas">
      </app-select-component>
    </div>

    <div>
      <app-select-component label="Programa" [options]="opciones.programas()" [ngModel]="filtros().programa"
        (ngModelChange)="aplicarFiltroTexto('programa', $event)" [filter]="filter" [showClear]="true" placeholder="Todos">
      </app-select-component>
    </div>

    <div>
      <app-select-component label="Cargo" [options]="opciones.roles()" [ngModel]="filtros().cargo"
        (ngModelChange)="aplicarFiltroTexto('cargo', $event)" [filter]="filter" [showClear]="true" placeholder="Todos">
      </app-select-component>
    </div>

    <div>
      <app-select-component label="Género" [options]="opciones.generos()" [ngModel]="filtros().genero"
        (ngModelChange)="aplicarFiltroExacto('genero', $event)" [filter]="filter" [showClear]="true" placeholder="Todos">
      </app-select-component>
    </div>

    <div>
      <app-select-component label="Semestre" [options]="opciones.semestres()" [ngModel]="filtros().semestre"
        (ngModelChange)="aplicarFiltroExacto('semestre', $event)" [filter]="filter" [showClear]="true" placeholder="Todos">
      </app-select-component>
    </div>
  </div>

  <p-table #dt [value]="data()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5,10,20]"
    [responsiveLayout]="'scroll'" [loading]="cargando()" styleClass="p-datatable-sm" [dataKey]="'identificacion'"
    [tableStyle]="{ 'min-width': '900px' }">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="identificacion">Identificación <p-sortIcon field="identificacion" /></th>
        <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
        <th pSortableColumn="facultad">Facultad <p-sortIcon field="facultad" /></th>
        <th pSortableColumn="programa">Programa <p-sortIcon field="programa" /></th>
        <th pSortableColumn="semestre">Semestre <p-sortIcon field="semestre" /></th>
        <th pSortableColumn="cargo">Cargo <p-sortIcon field="cargo" /></th>
        <th pSortableColumn="genero">Género <p-sortIcon field="genero" /></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-u>
      <tr>
        <td>{{ u.identificacion }}</td>
        <td class="font-medium">{{ u.nombre }}</td>
        <td>{{ u.facultad }}</td>
        <td>{{ u.programa }}</td>
        <td>{{ u.semestre }}</td>
        <td>{{ u.cargo || u.rol }}</td>
        <td>{{ fmtGenero(u.genero) }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center text-color-secondary">Sin resultados</td>
      </tr>
    </ng-template>

  </p-table>
</p-card>
