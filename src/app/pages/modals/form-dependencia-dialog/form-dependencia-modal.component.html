<p-dialog
  [(visible)]="visible"
  (onHide)="onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '520px', maxWidth: '95vw' }"
  styleClass="dep-dialog"
>
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3">
      <div class="dialog-icon">
        <i [class]="modoEdicion ? 'pi pi-pencil' : 'pi pi-plus'"></i>
      </div>
      <span class="p-dialog-title">
        {{ modoEdicion ? 'Editar Dependencia' : 'Nueva Dependencia' }}
      </span>
    </div>
  </ng-template>

  <form [formGroup]="formDependencia" class="dep-form">
    <!-- Nombre -->
    <div class="form-field">
      <label for="dep-nombre" class="form-label">
        Nombre <span class="required">*</span>
      </label>
      <input
        pInputText
        id="dep-nombre"
        formControlName="nombre"
        placeholder="Ej. Biblioteca, Financiera, Registro"
        class="w-full"
        [class.ng-invalid]="formDependencia.get('nombre')?.invalid && formDependencia.get('nombre')?.touched"
      />
      @if (nombreError) {
      <small class="form-error">{{ nombreError }}</small>
      }
    </div>

    <!-- Descripción -->
    <div class="form-field">
      <label for="dep-descripcion" class="form-label">Descripción</label>
      <textarea
        pTextarea
        id="dep-descripcion"
        formControlName="descripcion"
        rows="3"
        placeholder="Descripción opcional de la dependencia..."
        class="w-full"
      ></textarea>
    </div>

    <!-- Tipo de Acceso -->
    <div class="form-field">
      <label class="form-label">Tipo de Acceso</label>
      <div class="estado-toggle">
        <p-button
          [label]="formDependencia.get('tipoAcceso')?.value === 'CARGO' ? 'Por Cargo' : 'Por Cédula'"
          [icon]="formDependencia.get('tipoAcceso')?.value === 'CARGO' ? 'pi pi-briefcase' : 'pi pi-id-card'"
          [severity]="formDependencia.get('tipoAcceso')?.value === 'CARGO' ? 'info' : 'secondary'"
          [outlined]="true"
          (onClick)="formDependencia.get('tipoAcceso')?.setValue(formDependencia.get('tipoAcceso')?.value === 'CARGO' ? 'IDENTIFICACION' : 'CARGO')"
        />
      </div>
    </div>

    <!-- Estado (solo en edición) -->
    @if (modoEdicion) {
    <div class="form-field">
      <label class="form-label">Estado</label>
      <div class="estado-toggle">
        <p-button
          [label]="formDependencia.get('activo')?.value ? 'Activa' : 'Inactiva'"
          [icon]="formDependencia.get('activo')?.value ? 'pi pi-check-circle' : 'pi pi-ban'"
          [severity]="formDependencia.get('activo')?.value ? 'success' : 'secondary'"
          [outlined]="true"
          (onClick)="formDependencia.get('activo')?.setValue(!formDependencia.get('activo')?.value)"
        />
      </div>
    </div>
    }
  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-3">
      <p-button
        label="Cancelar"
        icon="pi pi-times"
        severity="secondary"
        [outlined]="true"
        (onClick)="onHide()"
      />
      <p-button
        [label]="modoEdicion ? 'Actualizar' : 'Crear Dependencia'"
        [icon]="modoEdicion ? 'pi pi-check' : 'pi pi-plus'"
        [loading]="guardando"
        [disabled]="formDependencia.invalid"
        (onClick)="guardar()"
      />
    </div>
  </ng-template>
</p-dialog>
